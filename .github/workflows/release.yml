name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust tests
        run: cargo test

  build-darwin-arm64:
    name: Build macOS ARM64
    runs-on: macos-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Strip binary
        run: strip target/aarch64-apple-darwin/release/aft-mcp

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-arm64
          path: target/aarch64-apple-darwin/release/aft-mcp
          if-no-files-found: error

  build-darwin-x64:
    name: Build macOS x64
    runs-on: macos-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build
        run: cargo build --release --target x86_64-apple-darwin

      - name: Strip binary
        run: strip target/x86_64-apple-darwin/release/aft-mcp

      - uses: actions/upload-artifact@v4
        with:
          name: darwin-x64
          path: target/x86_64-apple-darwin/release/aft-mcp
          if-no-files-found: error

  build-linux-arm64:
    name: Build Linux ARM64
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build
        run: cross build --release --target aarch64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: target/aarch64-unknown-linux-musl/release/aft-mcp
          if-no-files-found: error

  build-linux-x64:
    name: Build Linux x64
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install cross
        run: cargo install cross --version 0.2.5 --locked

      - name: Build
        run: cross build --release --target x86_64-unknown-linux-musl

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: target/x86_64-unknown-linux-musl/release/aft-mcp
          if-no-files-found: error

  build-win32-x64:
    name: Build Windows x64
    runs-on: windows-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - uses: actions/upload-artifact@v4
        with:
          name: win32-x64
          path: target/x86_64-pc-windows-msvc/release/aft-mcp.exe
          if-no-files-found: error

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-darwin-arm64
      - build-darwin-x64
      - build-linux-arm64
      - build-linux-x64
      - build-win32-x64
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/darwin-arm64/aft-mcp release-assets/aft-mcp-darwin-arm64
          cp artifacts/darwin-x64/aft-mcp release-assets/aft-mcp-darwin-x64
          cp artifacts/linux-arm64/aft-mcp release-assets/aft-mcp-linux-arm64
          cp artifacts/linux-x64/aft-mcp release-assets/aft-mcp-linux-x64
          cp artifacts/win32-x64/aft-mcp.exe release-assets/aft-mcp-win32-x64.exe
          chmod +x release-assets/aft-mcp-*

      - name: Generate checksums
        run: |
          cd release-assets
          shasum -a 256 aft-mcp-* > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*

  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [github-release]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare and publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"

          publish_platform() {
            local dir=$1
            local artifact=$2
            local binary=$3

            mkdir -p "packages/npm/${dir}/bin"
            cp "artifacts/${artifact}/${binary}" "packages/npm/${dir}/bin/${binary}"
            chmod +x "packages/npm/${dir}/bin/${binary}"
            local name
            name=$(cd "packages/npm/${dir}" && node -p "require('./package.json').name")
            if npm view "${name}@${VERSION}" version &>/dev/null; then
              echo "${name}@${VERSION} already published, skipping"
              return 0
            fi
            (cd "packages/npm/${dir}" && npm pkg set "version=${VERSION}" && npm publish --access public)
          }

          publish_platform darwin-arm64 darwin-arm64 aft-mcp
          publish_platform darwin-x64 darwin-x64 aft-mcp
          publish_platform linux-arm64 linux-arm64 aft-mcp
          publish_platform linux-x64 linux-x64 aft-mcp
          publish_platform win32-x64 win32-x64 aft-mcp.exe

      - name: Publish root package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME#v}"
          cp README.md packages/npm/README.md
          cd packages/npm
          npm pkg set "version=${VERSION}"
          for pkg in \
            "@dazarodev/aft-mcp-darwin-arm64" \
            "@dazarodev/aft-mcp-darwin-x64" \
            "@dazarodev/aft-mcp-linux-arm64" \
            "@dazarodev/aft-mcp-linux-x64" \
            "@dazarodev/aft-mcp-win32-x64"; do
            npm pkg set "optionalDependencies.${pkg}=${VERSION}"
          done
          if npm view "aft-mcp@${VERSION}" version &>/dev/null; then
            echo "aft-mcp@${VERSION} already published, skipping"
          else
            npm publish --access public
          fi
