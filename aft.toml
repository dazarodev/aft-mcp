# aft.toml — place in project root or ~/.config/aft/config.toml
#
# Which compiled-in languages to activate (default: all).
# Reduces noise in outline/callers for projects that only use certain languages.
# languages = ["typescript", "javascript", "python", "css", "html"]
#
# Project root override (default: auto-detect from CWD).
# root = "/path/to/project"
#
# Framework lifecycle methods to treat as entry points for trace_to.
# These are project-specific (not language-specific) because frameworks
# like LWC, React, Angular, Vue are per-project choices.
#
# [entry_points]
# lifecycle = [
#   "connectedCallback",    # LWC
#   "disconnectedCallback", # LWC
#   "renderedCallback",     # LWC
#   "errorCallback",        # LWC
# ]
